name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coval-linux-x64
            binary: coval
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: coval-linux-arm64
            binary: coval
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: coval-macos-x64
            binary: coval
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coval-macos-arm64
            binary: coval
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coval-windows-x64
            binary: coval.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && sha256sum *.tar.gz > SHA256SUMS)
          done
          cat */SHA256SUMS > ../SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.tar.gz
            SHA256SUMS
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS

      - name: Parse checksums
        id: sha
        run: |
          echo "macos_arm64=$(grep 'coval-macos-arm64' SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$(grep 'coval-macos-x64' SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep 'coval-linux-arm64' SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(grep 'coval-linux-x64' SHA256SUMS | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA_MACOS_ARM64: ${{ steps.sha.outputs.macos_arm64 }}
          SHA_MACOS_X64: ${{ steps.sha.outputs.macos_x64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/coval-ai/homebrew-tap.git" tap
          cd tap

          cat > Formula/coval.rb << FORMULA
          class Coval < Formula
            desc "CLI for Coval AI agent evaluation platform"
            homepage "https://coval.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/coval-ai/cli/releases/download/v${VERSION}/coval-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              else
                url "https://github.com/coval-ai/cli/releases/download/v${VERSION}/coval-macos-x64.tar.gz"
                sha256 "${SHA_MACOS_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/coval-ai/cli/releases/download/v${VERSION}/coval-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/coval-ai/cli/releases/download/v${VERSION}/coval-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "coval"
            end

            test do
              system "#{bin}/coval", "--version"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/coval.rb
          git commit -m "chore: update coval to ${VERSION}"
          git push origin main
